{% extends "layout.html" %}
{% block title %}Join | {{ site_name }}{% endblock %}
{% block content %}
<section class="auth-shell">
  <form class="panel form-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <p class="eyebrow">Create your client account</p>
    <h1>Join the training site</h1>
    <label>Username<input name="username" required autocomplete="username"></label>
    <label>Full name for certificate<input name="name" required autocomplete="name"></label>
    <label>Email<input name="email" type="email" required autocomplete="email"></label>
    <label>Password<input name="password" type="password" required minlength="8" autocomplete="new-password"></label>
    <button class="btn" type="submit">Create account</button>
    <p class="muted">After signup, complete payment or wait for admin approval to unlock the simulator library.</p>
  </form>
</section>
{% endblock %}
